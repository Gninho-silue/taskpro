/* ─── TOKENS ────────────────────────────────────────────── */
const C = {
  bg:       "#080812",
  surface:  "#0c0c1d",
  card:     "#0f0f20",
  border:   "#1e1e3a",
  border2:  "#2a2a48",
  text:     "#e8e8f0",
  muted:    "#6b6b8a",
  dim:      "#3b3b5e",
  purple:   "#7c3aed",
  purpleL:  "#a78bfa",
  purpleD:  "#4c1d95",
  green:    "#10b981",
  amber:    "#f59e0b",
  red:      "#ef4444",
  cyan:     "#06b6d4",
};

const STATUS_COLOR  = { PLANNING:"#6b6b8a", IN_PROGRESS:C.purple, ON_HOLD:C.amber, COMPLETED:C.green, CANCELLED:C.red };
const PRIORITY_COLOR = { LOW:C.muted, MEDIUM:C.cyan, HIGH:C.amber, URGENT:C.red };
const PRIORITY_BG   = { LOW:"rgba(107,107,138,.15)", MEDIUM:"rgba(6,182,212,.15)", HIGH:"rgba(245,158,11,.15)", URGENT:"rgba(239,68,68,.15)" };

/* ─── ICONS (inline SVG helpers) ───────────────────────── */
const Icon = ({ d, size=16, stroke=C.muted }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d={d}/>
  </svg>
);

/* ─── SHARED COMPONENTS ─────────────────────────────────── */
function Badge({ label, color, bg }) {
  return (
    <span style={{ fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:6, background: bg || `${color}22`, color: color, whiteSpace:"nowrap" }}>
      {label}
    </span>
  );
}

function Avatar({ user, size=28 }) {
  if (!user) return <div style={{ width:size, height:size, borderRadius:"50%", background:C.border, border:`1px dashed ${C.dim}` }} />;
  return (
    <div style={{ width:size, height:size, borderRadius:"50%", background:"linear-gradient(135deg,#7c3aed,#10b981)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:size*0.36, fontWeight:700, color:"#fff", flexShrink:0 }}>
      {user.firstname[0]}{user.lastname[0]}
    </div>
  );
}

function GridBg({ opacity=0.025 }) {
  return (
    <div style={{
      position:"absolute", inset:0, pointerEvents:"none",
      backgroundImage:`linear-gradient(rgba(255,255,255,${opacity}) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,${opacity}) 1px, transparent 1px)`,
      backgroundSize:"40px 40px",
    }} />
  );
}

function Btn({ children, variant="primary", onClick, style: s, size="md" }) {
  const pad = size==="sm" ? "6px 14px" : "10px 20px";
  const fs  = size==="sm" ? 12 : 13;
  const base = {
    display:"inline-flex", alignItems:"center", gap:7,
    padding:pad, borderRadius:8, border:"none", cursor:"pointer",
    fontFamily:"inherit", fontSize:fs, fontWeight:600,
    transition:"all 0.15s", ...s,
  };
  const vars = {
    primary:  { background:C.purple, color:"#fff" },
    ghost:    { background:"transparent", color:C.muted, border:`1px solid ${C.border}` },
    danger:   { background:"rgba(239,68,68,.15)", color:C.red, border:`1px solid rgba(239,68,68,.25)` },
    success:  { background:"rgba(16,185,129,.15)", color:C.green, border:`1px solid rgba(16,185,129,.25)` },
  };
  return <button style={{ ...base, ...vars[variant] }} onClick={onClick}>{children}</button>;
}

/* ─── AUTH ──────────────────────────────────────────────── */

  const inputStyle = {
    width:"100%", padding:"11px 14px",
    background:"#0c0c1d", border:`1px solid ${C.border}`,
    borderRadius:8, color:C.text, fontSize:13,
    outline:"none", transition:"border-color .15s",
  };

  return (
    <div style={{ height:"100%", display:"flex", alignItems:"center", justifyContent:"center", position:"relative", background:C.bg }}>
      <GridBg opacity={0.03} />

      {/* Glow blobs */}
      <div style={{ position:"absolute", width:400, height:400, borderRadius:"50%", background:"radial-gradient(circle, rgba(124,58,237,.12) 0%, transparent 70%)", top:"10%", left:"20%", pointerEvents:"none" }} />
      <div style={{ position:"absolute", width:300, height:300, borderRadius:"50%", background:"radial-gradient(circle, rgba(16,185,129,.08) 0%, transparent 70%)", bottom:"15%", right:"25%", pointerEvents:"none" }} />

      <div style={{ width:420, position:"relative", zIndex:1 }}>
        {/* Logo */}
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ display:"inline-flex", alignItems:"center", gap:10, marginBottom:16 }}>
            <div style={{ width:40, height:40, borderRadius:10, background:"linear-gradient(135deg,#7c3aed,#a855f7)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, fontWeight:800, color:"#fff" }}>T</div>
            <span style={{ fontSize:22, fontWeight:800, color:C.text, letterSpacing:"-0.5px" }}>TaskPro</span>
          </div>
          <p style={{ fontSize:13, color:C.muted }}>{mode==="login" ? "Sign in to your workspace" : "Create your account"}</p>

        {/* Card */}

              <div>
                <label style={{ fontSize:11, color:C.muted, display:"block", marginBottom:6 }}>FIRST NAME</label>
                <input style={inputStyle} value={form.firstname} onChange={set("firstname")} placeholder="Alex"
                  onFocus={e=>e.target.style.borderColor=C.purple} onBlur={e=>e.target.style.borderColor=C.border} />
              </div>
              <div>
                <label style={{ fontSize:11, color:C.muted, display:"block", marginBottom:6 }}>LAST NAME</label>
                <input style={inputStyle} value={form.lastname} onChange={set("lastname")} placeholder="Dupont"
                  onFocus={e=>e.target.style.borderColor=C.purple} onBlur={e=>e.target.style.borderColor=C.border} />
              </div>
            </div>
          )}
          <div style={{ marginBottom:14 }}>
            <label style={{ fontSize:11, color:C.muted, display:"block", marginBottom:6 }}>EMAIL</label>
            <input style={inputStyle} type="email" value={form.email} onChange={set("email")} placeholder="you@company.com"
              onFocus={e=>e.target.style.borderColor=C.purple} onBlur={e=>e.target.style.borderColor=C.border} />
          </div>
          <div style={{ marginBottom:24 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <label style={{ fontSize:11, color:C.muted }}>PASSWORD</label>
              {mode==="login" && <button onClick={()=>{}} style={{ fontSize:11, color:C.purple, background:"none", border:"none", cursor:"pointer", fontFamily:"inherit" }}>Forgot password?</button>}
            </div>
            <input style={inputStyle} type="password" value={form.password} onChange={set("password")} placeholder="••••••••"
              onFocus={e=>e.target.style.borderColor=C.purple} onBlur={e=>e.target.style.borderColor=C.border} />
          </div>

          <button onClick={onLogin} style={{
            width:"100%", padding:"12px", borderRadius:8, border:"none", cursor:"pointer",
            background:"linear-gradient(135deg, #7c3aed, #6d28d9)", color:"#fff",
            fontSize:14, fontWeight:700, fontFamily:"inherit", letterSpacing:"0.03em",
            transition:"opacity .15s",
          }}
          onMouseEnter={e=>e.currentTarget.style.opacity=".88"}
          onMouseLeave={e=>e.currentTarget.style.opacity="1"}
          >{mode==="login" ? "Sign in" : "Create account"}</button>

          <p style={{ textAlign:"center", fontSize:12, color:C.muted, marginTop:20 }}>
            {mode==="login" ? "No account? " : "Already have one? "}
            <button onClick={()=>setMode(m=>m==="login"?"register":"login")} style={{ color:C.purple, background:"none", border:"none", cursor:"pointer", fontFamily:"inherit", fontSize:12, fontWeight:600 }}>
              {mode==="login" ? "Register" : "Sign in"}

          </p>
        </div>
      </div>
    </div>

/* ─── SIDEBAR ───────────────────────────────────────────── */
const NAV = [
  { id:"dashboard",      label:"Dashboard",      path:"M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z" },
  { id:"projects",       label:"Projects",        path:"M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" },
  { id:"kanban",         label:"Kanban Board",    path:"M3 3h5v18H3zM10 3h5v12h-5zM17 3h5v15h-5z" },
  { id:"tasks",          label:"My Tasks",        path:"M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" },
  { id:"teams",          label:"Teams",           path:"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" },
  { id:"notifications",  label:"Notifications",   path:"M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0", badge:true },
];

function Sidebar({ page, setPage, unread, collapsed, setCollapsed }) {
  return (
    <aside style={{ width:collapsed?64:220, minWidth:collapsed?64:220, background:C.surface, borderRight:`1px solid ${C.border}`, display:"flex", flexDirection:"column", transition:"all .22s ease", overflow:"hidden", position:"relative", zIndex:10 }}>
      {/* Logo */}
      <div style={{ padding:"18px 14px 16px", display:"flex", alignItems:"center", gap:10, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ width:32, height:32, borderRadius:8, background:"linear-gradient(135deg,#7c3aed,#a855f7)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:800, color:"#fff", flexShrink:0 }}>T</div>
        {!collapsed && <span style={{ fontSize:16, fontWeight:800, color:C.text, letterSpacing:"-0.5px", whiteSpace:"nowrap" }}>TaskPro</span>}
      </div>

      {/* Nav */}
      <nav style={{ flex:1, padding:"10px 8px", display:"flex", flexDirection:"column", gap:2 }}>
        {NAV.map(item => {
          const active = page===item.id;
          return (
            <button key={item.id} onClick={()=>setPage(item.id)} style={{
              display:"flex", alignItems:"center", gap:10,
              padding: collapsed ? "10px 14px" : "10px 12px",
              borderRadius:8, border:"none", cursor:"pointer",
              background: active ? "rgba(124,58,237,.18)" : "transparent",
              color: active ? C.purpleL : C.muted,
              fontFamily:"inherit", fontSize:13, fontWeight: active?600:400,
              transition:"all .15s", textAlign:"left", width:"100%", position:"relative",
            }}
            onMouseEnter={e=>{ if(!active){e.currentTarget.style.background="rgba(255,255,255,.04)"; e.currentTarget.style.color=C.purpleL;} }}
            onMouseLeave={e=>{ e.currentTarget.style.background=active?"rgba(124,58,237,.18)":"transparent"; e.currentTarget.style.color=active?C.purpleL:C.muted; }}
            >
              <Icon d={item.path} size={17} stroke="currentColor" />
              {!collapsed && <span style={{ whiteSpace:"nowrap" }}>{item.label}</span>}
              {item.badge && unread>0 && !collapsed && (
                <span style={{ marginLeft:"auto", background:C.purple, color:"#fff", borderRadius:10, padding:"1px 6px", fontSize:10, fontWeight:700 }}>{unread}</span>
              )}
              {item.badge && unread>0 && collapsed && (
                <span style={{ position:"absolute", top:6, right:6, width:7, height:7, borderRadius:"50%", background:C.red }} />
              )}
            </button>
          );
        })}
      </nav>

      {/* User + collapse */}
      <div style={{ padding:"10px 8px 12px", borderTop:`1px solid ${C.border}` }}>
        {!collapsed && (
          <div style={{ padding:"8px 12px", display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
            <Avatar user={MOCK_USER} size={28} />
            <div style={{ overflow:"hidden" }}>
              <div style={{ fontSize:12, fontWeight:600, color:C.text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{MOCK_USER.firstname} {MOCK_USER.lastname}</div>
              <div style={{ fontSize:10, color:C.muted, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{MOCK_USER.email}</div>
            </div>
          </div>
        )}
        <button onClick={()=>setCollapsed(c=>!c)} style={{
          display:"flex", alignItems:"center", justifyContent:collapsed?"center":"flex-end",
          padding:"7px 12px", borderRadius:8, border:"none", cursor:"pointer",
          background:"transparent", color:C.dim, fontFamily:"inherit", width:"100%", transition:"color .15s",
        }}
        onMouseEnter={e=>e.currentTarget.style.color=C.purpleL}
        onMouseLeave={e=>e.currentTarget.style.color=C.dim}
        >
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ transform:collapsed?"rotate(180deg)":"none", transition:"transform .22s" }}><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>
    </aside>
  );
}

/* ─── TOPBAR ────────────────────────────────────────────── */
function Topbar({ title, subtitle, children }) {
  return (
    <div style={{ padding:"20px 32px 0", display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexShrink:0 }}>
      <div>
        <h1 style={{ fontSize:20, fontWeight:800, color:C.text, letterSpacing:"-0.4px" }}>{title}</h1>
        {subtitle && <p style={{ fontSize:12, color:C.muted, marginTop:3 }}>{subtitle}</p>}
      </div>
      <div style={{ display:"flex", gap:10, alignItems:"center" }}>{children}</div>
    </div>
  );
}

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Topbar title={<>Good morning, <span style={{color:C.purpleL}}>Alex</span> 👋</>} subtitle="Friday, April 25, 2026 · 4 tasks pending">
        <Btn variant="ghost" size="sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search

        <Btn size="sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

            <div key={i} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"22px 24px" }}>
              <div style={{ fontSize:34, fontWeight:800, color:s.a, letterSpacing:"-1px", marginBottom:6 }}>{s.v}</div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
          {/* My Tasks */}

  React.useEffect(()=>{
    const handler = e => { if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return ()=>window.removeEventListener("keydown", handler);
  }, [onClose]);

  const addComment = () => {
    if(!comment.trim()) return;
    setComments(c=>[...c, { id:Date.now(), user:MOCK_USER, content:comment.trim(), time:"just now" }]);
    setComment("");
  };

  const pct = task.estimatedHours > 0 ? Math.min(100, Math.round((task.actualHours/task.estimatedHours)*100)) : 0;

  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.65)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:C.surface, border:`1px solid ${C.border}`, borderRadius:16,
        width:"100%", maxWidth:680, maxHeight:"90vh", overflowY:"auto",
      }}>
        {/* Header */}
        <div style={{ padding:"22px 24px 18px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"flex-start", gap:14 }}>
          <div style={{ flex:1 }}>
            <div style={{ display:"flex", gap:8, marginBottom:10, flexWrap:"wrap" }}>
              <Badge label={task.priority} color={PRIORITY_COLOR[task.priority]} bg={PRIORITY_BG[task.priority]} />
              <Badge label={task.status.replace(/_/g," ")} color={task.status==="DONE"?C.green:task.status==="IN_PROGRESS"?C.purpleL:C.muted} />
              {task.labels.map(l=><span key={l.id} style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:6, background:`${l.color}22`, color:l.color }}>{l.name}</span>)}
            </div>
            <h2 style={{ fontSize:17, fontWeight:800, color:C.text, lineHeight:1.35, letterSpacing:"-0.3px" }}>{task.title}</h2>
          </div>
          <button onClick={onClose} style={{ background:"transparent", border:"none", cursor:"pointer", color:C.muted, padding:4, borderRadius:6, flexShrink:0 }}
          onMouseEnter={e=>e.currentTarget.style.color=C.text} onMouseLeave={e=>e.currentTarget.style.color=C.muted}
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div style={{ padding:"20px 24px" }}>
          {/* Description */}
          <p style={{ fontSize:13, color:C.muted, lineHeight:1.7, marginBottom:22 }}>{task.description}</p>

          {/* Meta grid */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14, marginBottom:22 }}>
            {[
              { label:"Assignee", value: task.assignee ? `${task.assignee.firstname} ${task.assignee.lastname}` : "Unassigned" },
              { label:"Due Date", value: task.dueDate },
              { label:"Est. Hours", value: `${task.actualHours}h / ${task.estimatedHours}h` },
            ].map(m=>(
              <div key={m.label} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:9, padding:"12px 14px" }}>
                <div style={{ fontSize:10, color:C.muted, marginBottom:5, textTransform:"uppercase", letterSpacing:".08em" }}>{m.label}</div>
                <div style={{ fontSize:12, fontWeight:600, color:C.text }}>{m.value}</div>
              </div>
            ))}
          </div>

          {/* Progress */}
          {task.estimatedHours > 0 && (
            <div style={{ marginBottom:22 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:C.muted, marginBottom:7 }}>
                <span>Progress</span>
                <span style={{ color:C.text, fontWeight:600 }}>{pct}%</span>
              </div>
              <div style={{ height:6, background:C.border, borderRadius:3 }}>
                <div style={{ height:"100%", width:`${pct}%`, background:`linear-gradient(90deg, ${C.purple}, ${C.green})`, borderRadius:3, transition:"width .4s" }} />
              </div>
            </div>
          )}

          {/* Comments */}
          <div>
            <h3 style={{ fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:".1em", marginBottom:12 }}>Comments ({comments.length})</h3>
            <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:14 }}>
              {comments.map(c=>(
                <div key={c.id} style={{ display:"flex", gap:10 }}>
                  <Avatar user={c.user} size={28} />
                  <div style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:9, padding:"10px 14px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                      <span style={{ fontSize:11, fontWeight:700, color:C.text }}>{c.user.firstname} {c.user.lastname}</span>
                      <span style={{ fontSize:10, color:"#4b4b6a" }}>{c.time}</span>
                    </div>
                    <p style={{ fontSize:12, color:C.muted, lineHeight:1.6 }}>{c.content}</p>
                  </div>
                </div>
              ))}
            </div>

            {/* Add comment */}
            <div style={{ display:"flex", gap:10 }}>
              <Avatar user={MOCK_USER} size={28} />
              <div style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:9, padding:"10px 14px", display:"flex", flexDirection:"column", gap:8, transition:"border-color .15s" }}>
                <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="Write a comment…" rows={2} style={{
                  background:"transparent", border:"none", outline:"none", resize:"none",
                  color:C.text, fontSize:12, fontFamily:"inherit", lineHeight:1.6,
                }} />
                {comment.trim() && (
                  <div style={{ display:"flex", justifyContent:"flex-end" }}>
                    <Btn size="sm" onClick={addComment}>Post comment</Btn>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── TWEAKS PANEL ───────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#7c3aed",
  "sidebarCollapsed": false,
  "compactCards": false
}/*EDITMODE-END*/;

function TweaksPanel({ tweaks, setTweaks, visible, onClose }) {
  if (!visible) return null;
  return (
    <div style={{
      position:"fixed", bottom:20, right:20, zIndex:200,
      background:C.surface, border:`1px solid ${C.border}`, borderRadius:14,
      padding:"18px 20px", width:240, boxShadow:"0 20px 60px rgba(0,0,0,.6)",
    }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <span style={{ fontSize:12, fontWeight:700, color:C.text }}>Tweaks</span>
        <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted }}>✕</button>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div>
          <label style={{ fontSize:11, color:C.muted, display:"block", marginBottom:6 }}>ACCENT COLOR</label>
          <div style={{ display:"flex", gap:8 }}>
            {["#7c3aed","#2563eb","#10b981","#f59e0b","#ef4444"].map(c=>(
              <div key={c} onClick={()=>setTweaks(t=>({...t,accentColor:c}))} style={{
                width:24, height:24, borderRadius:6, background:c, cursor:"pointer",
                border:`2px solid ${tweaks.accentColor===c?"#fff":"transparent"}`, transition:"border .15s",
              }} />
            ))}
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontSize:11, color:C.muted }}>COMPACT CARDS</span>
          <div onClick={()=>setTweaks(t=>({...t,compactCards:!t.compactCards}))} style={{
            width:36, height:20, borderRadius:10, background:tweaks.compactCards?tweaks.accentColor:C.border,
            position:"relative", cursor:"pointer", transition:"background .2s",
          }}>
            <div style={{ position:"absolute", top:2, left:tweaks.compactCards?18:2, width:16, height:16, borderRadius:8, background:"#fff", transition:"left .2s" }} />
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ───────────────────────────────────────────────── */
function App() {
  const [authed, setAuthed] = React.useState(false);
  const [page, setPage] = React.useState("dashboard");
  const [collapsed, setCollapsed] = React.useState(false);
  const [activeTask, setActiveTask] = React.useState(null);
  const [activeProject, setActiveProject] = React.useState(1);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  // Tweaks host protocol
  React.useEffect(()=>{
    const handler = e => {
      if(e.data?.type==="__activate_edit_mode")   setTweaksOpen(true);
      if(e.data?.type==="__deactivate_edit_mode")  setTweaksOpen(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({type:"__edit_mode_available"},"*");
    return ()=>window.removeEventListener("message", handler);
  },[]);

  const closeTweaks = () => {
    setTweaksOpen(false);
    window.parent.postMessage({type:"__edit_mode_dismissed"},"*");
  };

  const unread = NOTIFICATIONS.filter(n=>!n.read).length;

  if(!authed) return <AuthScreen onLogin={()=>setAuthed(true)} />;

  const pageMap = {
    dashboard:     <DashboardView setPage={setPage} setActiveTask={setActiveTask} setActiveProject={p=>{setActiveProject(p);setPage("kanban");}} />,
    projects:      <ProjectsView setPage={setPage} setActiveProject={p=>{setActiveProject(p);setPage("kanban");}} />,
    kanban:        <KanbanView activeProject={activeProject} setActiveTask={setActiveTask} />,
    tasks:         <TasksView setActiveTask={setActiveTask} />,
    teams:         <TeamsView />,
    notifications: <NotificationsView />,
  };

  // Apply accent color CSS variable
  const accentStyle = tweaks.accentColor !== "#7c3aed" ? `
    <style>
      :root { --accent: ${tweaks.accentColor}; }
    </style>
  ` : "";

  return (
    <div style={{ height:"100%", display:"flex", position:"relative", background:C.bg }}>
      <GridBg opacity={0.02} />
      <Sidebar page={page} setPage={setPage} unread={unread} collapsed={collapsed} setCollapsed={setCollapsed} />
      <main style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
        {pageMap[page] || pageMap.dashboard}
      </main>

      {activeTask && <TaskModal task={activeTask} onClose={()=>setActiveTask(null)} />}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksOpen} onClose={closeTweaks} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
