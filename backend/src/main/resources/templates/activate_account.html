
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Activation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 10px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .activation-code {
            font-size: 36px;
            text-align: center;
            margin-bottom: 20px;
        }
        .activation-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
        .activation-link a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Activation de compte</h1>
        <p class="greeting" th:text="'Hello ' + ${username} + ','"></p>
        <p>Merci de vous être inscrit! Veuillez utiliser le code d’activation suivant pour activer votre:</p>
        <div class="activation-code"><span th:text="${activation_code}"></span></div>
        <p>Ou cliquer le lien ci-dessous: </p>
        <div class="activation-link">

            <a th:href="${confirmation_url}" target="_blank">Activer votre compte</a>
        </div>
        <p>Si vous n’avez pas créé de compte, ignorez simplement cet email.</p>
        <hr>
        <small>TaskPro © 2025</small>
    </div>
</body>
</html>
