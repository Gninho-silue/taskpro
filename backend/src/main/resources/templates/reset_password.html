<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reinitialisation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 10px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .activation-code {
            font-size: 36px;
            text-align: center;
            margin-bottom: 20px;
        }
        .activation-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
        .activation-link a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reinitialisation de votre mot de passe</h1>
        <p class="greeting" th:text="'Hello ' + ${username} + ','"></p>
        <div class="activation-link">
            <p>Cliquez sur le lien suivant pour reinitialiser votre mot de passe :</p>
            <a th:href="${confirmation_url}" target="_blank">Reintialiser votre mot de passe</a>
        </div>
        <p>Utiliser le code our reinitialiser</p>
        <div class="activation-code"><span th:text="${activation_code}"></span></div>
         <p>Ce expire dans 2 hours</p>
        <small>TaskPro © 2025</small>
    </div>
</body>
</html>
