spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskprodb}
    username: ${DB_USERNAME:taskpro}
    password: ${DB_PASSWORD:taskpro}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:silue}
    password: ${MAIL_PASSWORD:silue}
    properties:
      mail:
        smtp:
          trust: "*"
        auth: true
        starttls:
          enabled: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000

server:
  port: 8081

logging:
  level:
    org.springframework.security: DEBUG
    com.example.taskpro: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Actuator configuration for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:default-secret-key-change-in-production}
      expiration: ${JWT_EXPIRATION:86400000}
  file:
    upload:
      files-output-path: ${FILE_UPLOAD_PATH:./uploads}
  bcrypt:
    strength: ${BCRYPT_STRENGTH:12}